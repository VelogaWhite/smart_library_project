<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Authentication</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-800 h-screen flex items-center justify-center">

    <div class="bg-white p-8 rounded-xl shadow-2xl w-full max-w-sm border-t-4 border-red-500">
        <div class="text-center mb-6">
            <div class="inline-block bg-red-100 text-red-600 p-3 rounded-full mb-3">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-gray-800">Admin Login</h1>
            <p class="text-gray-500 mt-1 text-sm">SSID: {{ member.ssid }} ({{ member.full_name }})</p>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded relative mb-4 text-sm text-center">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="post" action="{% url 'admin_auth' %}">
            {% csrf_token %}
            <div class="mb-6">
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Admin Password</label>
                <input type="password" id="password" name="password" required autofocus
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-red-500 outline-none text-lg text-center tracking-widest"
                    placeholder="••••••••">
            </div>
            
            <div class="flex gap-3">
                <a href="{% url 'index' %}" class="w-1/3 bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold py-3 rounded-lg text-center transition duration-200">
                    Cancel
                </a>
                <button type="submit" class="w-2/3 bg-red-600 hover:bg-red-700 text-white font-semibold py-3 rounded-lg transition duration-200">
                    Unlock 🔓
                </button>
            </div>
        </form>
    </div>

</body>
</html>
