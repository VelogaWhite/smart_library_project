<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin Panel{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    {% block extra_head %}{% endblock %}
</head>
<!-- เพิ่ม overflow-x-hidden w-full เพื่อป้องกันหน้าจอลั่นออกด้านข้างในมือถือ -->
<body class="bg-gray-100 min-h-screen overflow-x-hidden w-full">

    <nav class="bg-gray-800 text-white shadow-md sticky top-0 z-50 w-full">
        <div class="max-w-7xl mx-auto px-4 py-3">
            
            <div class="flex justify-between items-center w-full">
                <!-- Logo -->
                <div class="flex items-center gap-2 flex-shrink-0">
                    <span class="text-2xl">⚙️</span>
                    <span class="font-bold text-xl tracking-wide">Admin Panel</span>
                </div>
                
                <!-- Desktop Menu -->
                <div class="hidden md:flex gap-6 items-center font-medium text-sm">
                    <a href="{% url 'admin_dashboard' %}" class="{% if request.resolver_match.url_name == 'admin_dashboard' %}text-white border-b-2 border-blue-400 pb-1{% else %}text-gray-400 hover:text-white transition{% endif %}">📊 Dashboard</a>
                    <a href="{% url 'manage_users' %}" class="{% if request.resolver_match.url_name == 'manage_users' %}text-white border-b-2 border-blue-400 pb-1{% else %}text-gray-400 hover:text-white transition{% endif %}">👥 Users</a>
                    <a href="{% url 'manage_books' %}" class="{% if request.resolver_match.url_name == 'manage_books' %}text-white border-b-2 border-blue-400 pb-1{% else %}text-gray-400 hover:text-white transition{% endif %}">📚 Books</a>
                    <a href="{% url 'borrow_counter' %}" class="{% if request.resolver_match.url_name == 'borrow_counter' %}text-white border-b-2 border-blue-400 pb-1{% else %}text-gray-400 hover:text-white transition{% endif %}">📗 Borrow</a>
                    <a href="{% url 'return_counter' %}" class="{% if request.resolver_match.url_name == 'return_counter' %}text-white border-b-2 border-blue-400 pb-1{% else %}text-gray-400 hover:text-white transition{% endif %}">📥 Record</a>
                    <a href="{% url 'transaction_history' %}" class="{% if request.resolver_match.url_name == 'transaction_history' %}text-white border-b-2 border-blue-400 pb-1{% else %}text-gray-400 hover:text-white transition{% endif %}">📊 Transaction</a>
                    <a href="{% url 'admin_settings' %}" class="{% if request.resolver_match.url_name == 'admin_settings' %}text-white border-b-2 border-blue-400 pb-1{% else %}text-gray-400 hover:text-white transition{% endif %}">⚙️ Settings</a>
                    <a href="{% url 'index' %}" class="bg-red-500 hover:bg-red-600 px-4 py-1.5 rounded-lg shadow transition ml-4">Logout</a>
                </div>

                <!-- Mobile Menu Button -->
                <div class="md:hidden flex items-center">
                    <button id="mobile-menu-btn" type="button" class="text-gray-300 hover:text-white focus:outline-none">
                        <svg class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Mobile Menu Dropdown -->
            <div id="mobile-menu" class="hidden md:hidden mt-4 pb-2 space-y-2 border-t border-gray-700 pt-4 w-full">
                <a href="{% url 'admin_dashboard' %}" class="block px-3 py-2 rounded-md text-base font-medium {% if request.resolver_match.url_name == 'admin_dashboard' %}bg-gray-900 text-white{% else %}text-gray-300 hover:bg-gray-700 hover:text-white{% endif %}">📊 Dashboard</a>
                <a href="{% url 'manage_users' %}" class="block px-3 py-2 rounded-md text-base font-medium {% if request.resolver_match.url_name == 'manage_users' %}bg-gray-900 text-white{% else %}text-gray-300 hover:bg-gray-700 hover:text-white{% endif %}">👥 Users</a>
                <a href="{% url 'manage_books' %}" class="block px-3 py-2 rounded-md text-base font-medium {% if request.resolver_match.url_name == 'manage_books' %}bg-gray-900 text-white{% else %}text-gray-300 hover:bg-gray-700 hover:text-white{% endif %}">📚 Books</a>
                <a href="{% url 'borrow_counter' %}" class="block px-3 py-2 rounded-md text-base font-medium {% if request.resolver_match.url_name == 'borrow_counter' %}bg-gray-900 text-white{% else %}text-gray-300 hover:bg-gray-700 hover:text-white{% endif %}">📗 Borrow</a>
                <a href="{% url 'return_counter' %}" class="block px-3 py-2 rounded-md text-base font-medium {% if request.resolver_match.url_name == 'return_counter' %}bg-gray-900 text-white{% else %}text-gray-300 hover:bg-gray-700 hover:text-white{% endif %}">📥 Record</a>
                <a href="{% url 'transaction_history' %}" class="block px-3 py-2 rounded-md text-base font-medium {% if request.resolver_match.url_name == 'transaction_history' %}bg-gray-900 text-white{% else %}text-gray-300 hover:bg-gray-700 hover:text-white{% endif %}">📊 Transaction</a>
                <a href="{% url 'admin_settings' %}" class="block px-3 py-2 rounded-md text-base font-medium {% if request.resolver_match.url_name == 'admin_settings' %}bg-gray-900 text-white{% else %}text-gray-300 hover:bg-gray-700 hover:text-white{% endif %}">⚙️ Settings</a>
                <a href="{% url 'index' %}" class="block px-3 py-2 mt-4 rounded-md text-base font-medium bg-red-500 hover:bg-red-600 text-white text-center">Logout</a>
            </div>

        </div>
    </nav>

    <main class="w-full max-w-full">
        {% block content %}
        {% endblock %}
    </main>

    <script>
        document.getElementById('mobile-menu-btn').addEventListener('click', function() {
            var menu = document.getElementById('mobile-menu');
            menu.classList.toggle('hidden');
        });
    </script>

</body>
</html>
