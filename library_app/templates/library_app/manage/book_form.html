{% extends 'library_app/base_admin.html' %}

{% block title %}{{ action }} Book{% endblock %}

{% block content %}
<style>
    form p { margin-bottom: 1rem; }
    form label { display: block; font-size: 0.875rem; font-weight: 500; color: #374151; margin-bottom: 0.25rem; }
    form input, form select { padding: 0.5rem 0.75rem; border: 1px solid #d1d5db; border-radius: 0.5rem; outline: none; width: 100%; bg-color: #f9fafb; }
    form input:focus, form select:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2); }
</style>

<div class="flex items-center justify-center py-10">
    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-2xl border-t-4 border-blue-500">
        <div class="flex items-center justify-between mb-6">
            <h1 class="text-2xl font-bold text-gray-800">{{ action }} Book</h1>
            {% if action == 'Edit' %}
                <span class="bg-blue-50 text-blue-600 px-3 py-1 rounded-md text-sm font-mono font-bold">ID: {{ book.book_id }}</span>
            {% endif %}
        </div>

        <form method="post" class="space-y-4">
            {% csrf_token %}
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                {{ form.as_p }}
            </div>

            <div class="mt-8 flex gap-3 border-t pt-6">
                <a href="{% url 'manage_books' %}" class="w-1/3 bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold py-2.5 rounded-lg text-center transition">
                    Cancel
                </a>
                <button type="submit" class="w-2/3 bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded-lg shadow-md transition">
                    Save Book Information
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
