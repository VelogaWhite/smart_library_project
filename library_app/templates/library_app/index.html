<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Library - Enter SSID</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center">

    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-sm border-t-4 border-blue-500">
        <div class="text-center mb-6">
            <h1 class="text-3xl font-bold text-gray-800">📚 Smart Library</h1>
            <p class="text-gray-500 mt-2 text-sm">Please scan your Library Card or enter your SSID to continue.</p>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative mb-4 text-sm text-center">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="post" action="{% url 'index' %}">
            {% csrf_token %}
            <div class="mb-5">
                <label for="ssid" class="block text-sm font-medium text-gray-700 mb-1">SSID (Member ID)</label>
                <input type="number" id="ssid" name="ssid" required autofocus
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none text-lg text-center tracking-widest"
                    placeholder="e.g. 10000001">
            </div>
            
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition duration-200">
                Continue 🚀
            </button>
        </form>
    </div>

</body>
</html>
