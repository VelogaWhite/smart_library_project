<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Borrow Counter</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">

    <nav class="bg-gray-800 text-white shadow-sm">
        <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="font-bold text-xl">⚙️ Admin Panel</div>
            <div class="flex gap-4 items-center">
                <a href="{% url 'manage_users' %}" class="text-gray-400 hover:text-white transition">Users</a>
                <a href="{% url 'manage_books' %}" class="text-gray-400 hover:text-white transition">Books</a>
                <a href="{% url 'borrow_counter' %}" class="text-white font-semibold">Borrow</a>
                <a href="{% url 'index' %}" class="bg-red-500 hover:bg-red-600 px-3 py-1 rounded text-sm transition">Logout</a>
            </div>
        </div>
    </nav>

    <div class="max-w-3xl mx-auto px-4 py-10">
        
        <div class="bg-white p-8 rounded-xl shadow-lg border-t-4 border-blue-500">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-bold text-gray-800">📗 Counter: Borrow Book</h2>
                <p class="text-gray-500 mt-2">Scan Member ID and Book ID to process</p>
            </div>

            {% if messages %}
                {% for message in messages %}
                    <div class="{% if '❌' in message.tags or '⚠️' in message.tags or 'error' in message.tags %}bg-red-100 border-red-400 text-red-700{% else %}bg-green-100 border-green-400 text-green-700{% endif %} border px-4 py-3 rounded relative mb-6 text-center text-lg font-medium shadow-sm">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <form method="post" action="{% url 'borrow_counter' %}" class="space-y-6">
                {% csrf_token %}
                
                <div class="bg-gray-50 p-4 rounded-lg border border-gray-200">
                    <label for="ssid" class="block text-sm font-bold text-gray-700 mb-2 uppercase tracking-wide">1. Scan Member Card (SSID)</label>
                    <input type="number" id="ssid" name="ssid" required autofocus
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-2xl font-mono text-center tracking-widest bg-white shadow-inner"
                        placeholder="e.g. 10000001">
                </div>

                <div class="bg-gray-50 p-4 rounded-lg border border-gray-200">
                    <label for="book_id" class="block text-sm font-bold text-gray-700 mb-2 uppercase tracking-wide">2. Scan Book Barcode (Book ID)</label>
                    <input type="number" id="book_id" name="book_id" required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-2xl font-mono text-center tracking-widest bg-white shadow-inner"
                        placeholder="e.g. 10001">
                </div>

                <div class="bg-gray-50 p-4 rounded-lg border border-gray-200 flex items-center justify-between">
                    <label for="duration" class="text-sm font-bold text-gray-700 uppercase tracking-wide">3. Borrow Duration (Days)</label>
                    <input type="number" id="duration" name="duration" required value="7" min="1" max="30"
                        class="w-24 px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-xl font-bold text-center bg-white shadow-inner">
                </div>
                
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-lg text-xl shadow-md transition duration-200 mt-4">
                    Process Borrow 🚀
                </button>
            </form>
        </div>
    </div>

</body>
</html>
